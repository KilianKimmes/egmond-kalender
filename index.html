
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ferienwohnung Egmond aan Zee</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="app.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
<img src="images/wappen_neu.png" class="logo">
<h1>Ferienwohnung Egmond aan Zee</h1>
<p class="subtitle">Verfügbarkeit prüfen und Aufenthalt anfragen</p>
</header>

<main>

<section class="card">
<h2>Verfügbarkeit</h2>
<div id="calendar"></div>
<div id="nextSlot" class="next-slot"></div>

<div class="legend">
<span class="dot free"></span> frei
<span class="dot booked"></span> belegt
<span class="dot arrival"></span> mögliche Anreise
</div>
</section>

<section class="card">
<h2>Aufenthalt anfragen</h2>

<div class="selection">
<span id="selArrival">Anreise: –</span>
<span id="selDeparture">Abreise: –</span>
<span id="selNights"></span>
<span id="priceEstimate"></span>
</div>

<form id="bookingForm">

<label>Name
<input type="text" id="name" required>
</label>

<label>Email
<input type="email" id="email" required>
</label>

<label>Nachricht
<textarea id="message"></textarea>
</label>

<button class="primary" type="submit">Anfrage senden</button>

</form>

<div id="successMessage" class="success"></div>

</section>

<section class="card info">
<h2>Informationen</h2>
<p>Ferienwohnung nahe Strand und Dünen in Egmond aan Zee.</p>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
