
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Egmond aan Zee – Ferienwohnung</title>
<link rel="stylesheet" href="app.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">
<div class="hero-bg"></div>
<div class="hero-content">
<h1>Egmond aan Zee</h1>
<p>Ferienwohnung nahe Strand und Dünen</p>
<a href="#calendar" class="cta-btn">Verfügbarkeit prüfen</a>
</div>
</header>

<main>

<section id="calendar" class="card">
<h2>Zeitraum wählen</h2>
<div id="calendarGrid" class="calendar"></div>
</section>

<section class="card">
<h2>Kontakt</h2>

<div class="selection">
<span id="arrivalText">Anreise: –</span>
<span id="departureText">Abreise: –</span>
</div>

<form id="bookingForm">

<label>Name
<input type="text" id="name" required>
</label>

<label>Email
<input type="email" id="email" required>
</label>

<label>Telefon
<input type="tel" id="phone">
</label>

<label>Nachricht
<textarea id="message"></textarea>
</label>

<button class="primary-btn">Anfrage senden</button>

</form>

<div id="successBox" class="success"></div>

</section>

<section class="gallery">
<div class="gallery-grid" id="gallery"></div>
</section>

</main>

<script src="app.js"></script>

</body>
</html>
