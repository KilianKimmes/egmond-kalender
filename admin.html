<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Egmond Admin</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
  <div class="admin-shell">
    <section class="panel admin-login" id="adminLoginPanel">
      <div class="section-head">
        <div>
          <div class="kicker">Intern</div>
          <h1>Admin</h1>
        </div>
      </div>
      <form id="adminLoginForm" class="stack">
        <label class="field">
          <span>Passwort</span>
          <input id="adminPassword" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="primary-btn">Anmelden</button>
        <div id="adminLoginError" class="notice notice-error hidden"></div>
      </form>
    </section>

    <section class="dashboard hidden" id="dashboardPanel">
      <header class="dashboard-header">
        <div>
          <div class="eyebrow">Egmond</div>
          <h1>Admin-Dashboard</h1>
        </div>
        <div class="dashboard-actions">
          <a href="index.html" class="nav-pill admin">Public-App</a>
          <button type="button" class="nav-pill admin" id="printYearBtn">Drucken</button>
          <button type="button" class="nav-pill admin danger" id="logoutBtn">Abmelden</button>
        </div>
      </header>

      <div class="stat-grid" id="statGrid"></div>

      <nav class="dashboard-tabs" aria-label="Admin Bereiche">
        <button type="button" class="tab-btn is-active" data-tab="overview">Jahr</button>
        <button type="button" class="tab-btn" data-tab="bookings">Buchungen</button>
        <button type="button" class="tab-btn" data-tab="requests">Anfragen</button>
      </nav>

      <section class="tab-panel" data-panel="overview">
        <article class="panel">
          <div class="section-head">
            <div>
              <div class="kicker">Jahresübersicht</div>
              <h2 id="overviewYearTitle">2026</h2>
            </div>
            <div class="month-nav">
              <button type="button" class="icon-btn" id="prevYearBtn" aria-label="Vorheriges Jahr">‹</button>
              <button type="button" class="icon-btn" id="nextYearBtn" aria-label="Nächstes Jahr">›</button>
            </div>
          </div>
          <div class="legend compact">
            <span class="legend-item"><span class="legend-swatch booked"></span>belegt</span>
            <span class="legend-item"><span class="legend-swatch half"></span>halbtags</span>
          </div>
          <div id="adminYearGrid" class="year-grid"></div>
        </article>
      </section>

      <section class="tab-panel hidden" data-panel="bookings">
        <article class="panel">
          <div class="section-head">
            <div>
              <div class="kicker">Buchungen</div>
              <h2>Eintragen</h2>
            </div>
          </div>

          <form id="bookingAdminForm" class="stack">
            <div class="field-grid three">
              <label class="field">
                <span>Anreise</span>
                <input type="date" id="adminStart" required />
              </label>
              <label class="field">
                <span>Abreise</span>
                <input type="date" id="adminEnd" required />
              </label>
              <label class="field">
                <span>Typ</span>
                <select id="adminType">
                  <option value="full">Normal</option>
                  <option value="arrival-departure">Halbtags-Wechsel</option>
                </select>
              </label>
            </div>
            <label class="field">
              <span>Name</span>
              <input type="text" id="adminLabel" placeholder="Mietername" required />
            </label>
            <div class="action-row split">
              <button type="submit" class="primary-btn">Speichern</button>
              <div id="bookingAdminFeedback" class="notice hidden"></div>
            </div>
          </form>

          <div id="bookingList" class="data-list"></div>
        </article>
      </section>

      <section class="tab-panel hidden" data-panel="requests">
        <article class="panel">
          <div class="section-head">
            <div>
              <div class="kicker">Anfragen</div>
              <h2>Eingänge</h2>
            </div>
          </div>
          <div id="requestList" class="data-list"></div>
        </article>
      </section>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
