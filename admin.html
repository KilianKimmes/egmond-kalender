<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Egmond Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#2E7D32,#1B5E20);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.icon{font-size:48px;margin-bottom:12px}
h1{font-size:22px;font-weight:800;color:#1A2332;margin-bottom:6px}
p{font-size:14px;color:#7A8AA0;margin-bottom:24px}
input{width:100%;padding:14px 16px;border:2px solid #DDE3EC;border-radius:10px;font-size:16px;outline:none;transition:border-color .2s;margin-bottom:12px;text-align:center;letter-spacing:2px}
input:focus{border-color:#2E7D32}
button{width:100%;padding:15px;background:linear-gradient(135deg,#2E7D32,#1B5E20);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer}
button:active{transform:scale(.98)}
.err{color:#B71C1C;font-size:13px;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🏡</div>
  <h1>Egmond Admin</h1>
  <p>Bitte Passwort eingeben</p>
  <input id="pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">Anmelden</button>
  <div class="err" id="err">❌ Falsches Passwort</div>
</div>
<script>
function login(){
  const pw=document.getElementById('pw').value;
  if(pw==='FiegePils'){
    window.location.href='./index.html?admin=FiegePils';
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
</script>
</body>
</html>
